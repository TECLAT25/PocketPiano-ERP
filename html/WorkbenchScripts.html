<script>
(function () {
  'use strict';

  var queues = {
    all: {},
    new: {status: 'NEW'},
    critical: {priority: 'CRITICAL'},
    breached: {breached: true},
    pending: {status: 'PENDING_CUSTOMER'},
    warranty: {category: 'WARRANTY'}
  };

  function addCss() {
    if (document.getElementById('workbench-css')) return;
    var css = '.main{padding:14px!important}' +
      '.support-topbar{min-height:56px}' +
      '.view.is-active{display:block}' +
      '#view-dashboard .metric-grid{grid-template-columns:repeat(4,minmax(180px,1fr));gap:16px}' +
      '#view-dashboard .metric-card{min-height:132px;padding:22px}' +
      '#view-dashboard .metric-card strong{font-size:38px;line-height:1}' +
      '#view-dashboard .surface{padding:22px}' +
      '.support-workbench{display:grid!important;grid-template-columns:170px 330px minmax(640px,1fr);gap:14px;height:calc(100vh - 86px);min-height:720px}' +
      '.queue-panel,.ticket-list-panel,.support-detail{min-height:0;overflow:auto}' +
      '.queue-panel{padding:14px!important}' +
      '.queue-list{display:grid;gap:8px;margin-bottom:16px}' +
      '.queue-item{display:flex;justify-content:space-between;align-items:center;min-height:42px;padding:0 12px;border:1px solid var(--outline-variant);border-radius:12px;background:var(--surface-bright);color:var(--on-surface);cursor:pointer}' +
      '.queue-item.is-active{background:var(--primary-container);color:var(--on-primary-container);font-weight:800}' +
      '.compact-filters{display:grid;grid-template-columns:1fr;gap:10px}' +
      '.ticket-list-panel{padding:14px!important}' +
      '.ticket-list-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px}' +
      '.muted{color:var(--on-surface-variant)}' +
      '.ticket-card-table thead{display:none}' +
      '.ticket-card-table table,.ticket-card-table tbody,.ticket-card-table tr,.ticket-card-table td{display:block}' +
      '.ticket-card-table tbody{display:grid;gap:10px}' +
      '.ticket-card-table tr{padding:12px;border:1px solid var(--outline-variant);border-radius:12px;background:var(--surface-bright);cursor:pointer}' +
      '.ticket-card-table tr.is-selected{border-color:var(--primary);background:var(--primary-container)}' +
      '.ticket-card-table td{border:0!important;padding:0!important}' +
      '.ticket-card-table td:nth-child(1){font-weight:800;margin-bottom:8px}' +
      '.ticket-card-table td:nth-child(2),.ticket-card-table td:nth-child(3){display:inline-flex;margin:0 6px 8px 0;padding:3px 8px!important;border-radius:14px;background:var(--surface-container-high);font-size:11px;text-transform:uppercase}' +
      '.support-detail{padding:0!important}' +
      '.support-detail .detail-header{position:sticky;top:0;z-index:3;background:var(--surface);border-bottom:1px solid var(--outline-variant);padding:22px!important}' +
      '.support-detail .detail-header h2{font-size:26px;margin:6px 0 12px}' +
      '.support-detail .detail-grid{grid-template-columns:repeat(3,minmax(150px,1fr));padding:18px 22px;margin:0!important}' +
      '.support-detail .conversation{padding:0 22px 22px;margin:0!important}' +
      '.support-detail .message{font-size:14px;line-height:1.5}' +
      '@media(max-width:1180px){.support-workbench{grid-template-columns:150px 300px minmax(480px,1fr)}}' +
      '@media(max-width:900px){.support-workbench{grid-template-columns:1fr;height:auto}.queue-panel,.ticket-list-panel,.support-detail{max-height:none}}';
    var style = document.createElement('style');
    style.id = 'workbench-css';
    style.textContent = css;
    document.head.appendChild(style);
  }

  function normalize(value) {
    return String(value || '').trim().toUpperCase().replace(/ /g, '_');
  }

  function setFilter(id, value) {
    var control = document.getElementById(id);
    if (!control) return;
    if (control.type === 'checkbox') control.checked = Boolean(value);
    else control.value = value || '';
    control.dispatchEvent(new Event('change', {bubbles: true}));
  }

  function applyQueue(name) {
    var criteria = queues[name] || {};
    document.querySelectorAll('.queue-item').forEach(function (button) {
      button.classList.toggle('is-active', button.dataset.queue === name);
    });
    setFilter('filter-status', criteria.status || '');
    setFilter('filter-priority', criteria.priority || '');
    setFilter('filter-category', criteria.category || '');
    setFilter('filter-breached', Boolean(criteria.breached));
  }

  function bindQueues() {
    document.querySelectorAll('.queue-item').forEach(function (button) {
      if (button.dataset.bound === 'true') return;
      button.dataset.bound = 'true';
      button.addEventListener('click', function () {
        applyQueue(button.dataset.queue || 'all');
      });
    });
  }

  function writeCount(selector, value) {
    var node = document.querySelector(selector);
    if (!node) return;
    var next = String(value);
    if (node.textContent !== next) node.textContent = next;
  }

  function updateCounts() {
    var rows = Array.prototype.slice.call(document.querySelectorAll('#ticket-table-body tr'));
    writeCount('.queue-item[data-queue="all"] strong', rows.length);
    writeCount('.queue-item[data-queue="new"] strong', rows.filter(function (row) { return normalize(row.children[1] && row.children[1].textContent) === 'NEW'; }).length);
    writeCount('.queue-item[data-queue="critical"] strong', rows.filter(function (row) { return normalize(row.children[2] && row.children[2].textContent) === 'CRITICAL'; }).length);
    writeCount('.queue-item[data-queue="pending"] strong', rows.filter(function (row) { return normalize(row.children[1] && row.children[1].textContent) === 'PENDING_CUSTOMER'; }).length);
  }

  function scheduleUpdate() {
    window.clearTimeout(scheduleUpdate.timer);
    scheduleUpdate.timer = window.setTimeout(function () {
      bindQueues();
      updateCounts();
    }, 50);
  }

  function start() {
    addCss();
    bindQueues();
    updateCounts();
    var body = document.getElementById('ticket-table-body');
    if (body) {
      new MutationObserver(scheduleUpdate).observe(body, {childList: true});
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>
