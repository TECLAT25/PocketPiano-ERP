<script>
(function () {
  'use strict';

  function addCss() {
    if (document.getElementById('dashboard-workspace-css')) return;
    var style = document.createElement('style');
    style.id = 'dashboard-workspace-css';
    style.textContent = [
      '.app.support-shell{display:grid!important;grid-template-columns:1fr!important;width:100vw!important;max-width:100vw!important;overflow:hidden!important}',
      '.navigation{display:none!important}',
      '.main.support-main{width:100vw!important;max-width:100vw!important;height:100vh!important;padding:10px!important;overflow:hidden!important}',
      '.support-topbar{height:56px!important;margin-bottom:10px!important}',
      '#view-dashboard{display:none!important}',
      '#view-customer{display:none!important}',
      '#view-tickets.view.is-active{display:grid!important}',
      '#view-tickets.support-workbench{grid-template-columns:150px 300px minmax(0,1fr)!important;gap:10px!important;height:calc(100vh - 76px)!important;min-height:0!important;width:100%!important;max-width:100%!important;overflow:hidden!important}',
      '.queue-panel,.ticket-list-panel,.support-detail{height:100%!important;min-height:0!important;overflow:auto!important}',
      '.queue-panel{padding:10px!important}',
      '.queue-title h2{font-size:18px!important}',
      '.queue-item{min-height:38px!important;padding:0 10px!important;font-size:13px!important}',
      '.compact-filters{display:none!important}',
      '.ticket-list-panel{padding:10px!important}',
      '.ticket-list-header h1{font-size:22px!important}',
      '.ticket-card-table tbody{gap:8px!important}',
      '.ticket-card-table tr{padding:10px!important}',
      '.ticket-card-table td:nth-child(4),.ticket-card-table td:nth-child(5){font-size:12px!important;color:var(--on-surface-variant)!important}',
      '.support-detail{display:grid!important;grid-template-rows:auto auto minmax(0,1fr) auto!important;padding:0!important;overflow:hidden!important}',
      '.support-detail .detail-header{position:relative!important;top:auto!important;z-index:2!important;padding:14px!important;border-bottom:1px solid var(--outline-variant)!important;background:var(--surface)!important}',
      '.support-detail .detail-header h2{font-size:22px!important;line-height:1.15!important;margin:4px 0 8px!important}',
      '.support-detail .detail-chips{margin-bottom:8px!important}',
      '.support-detail .detail-grid{display:grid!important;grid-template-columns:repeat(6,minmax(0,1fr))!important;gap:8px!important;padding:10px 14px!important;margin:0!important;border-bottom:1px solid var(--outline-variant)!important;overflow:visible!important}',
      '.support-detail .detail-field{min-width:0!important}',
      '.support-detail .detail-field dt{font-size:10px!important;white-space:nowrap!important}',
      '.support-detail .detail-field dd{font-size:12px!important;white-space:normal!important;word-break:break-word!important}',
      '.support-detail .conversation{min-height:0!important;overflow:auto!important;padding:12px 14px!important;margin:0!important}',
      '.support-detail .conversation h3{position:sticky!important;top:0!important;background:var(--surface)!important;padding:0 0 8px!important;margin:0 0 8px!important;z-index:1!important}',
      '.support-detail .message{padding:12px!important;margin-bottom:10px!important;border-radius:14px!important;background:var(--surface-container)!important;line-height:1.45!important}',
      '.support-detail .message p{white-space:pre-wrap!important;margin-bottom:0!important}',
      '.reply-box{margin:0!important;border-radius:0!important;border-left:0!important;border-right:0!important;border-bottom:0!important;max-height:240px!important;overflow:auto!important}',
      '.reply-box textarea{min-height:92px!important}',
      '.ticket-actions{grid-template-columns:repeat(5,minmax(0,1fr))!important;gap:8px!important;padding:10px!important;margin-top:8px!important}',
      '.ticket-action-field-wide{grid-column:span 2!important}',
      '.ticket-action-field select,.ticket-action-field input{min-height:40px!important;font-size:13px!important}',
      '.ticket-input-action{grid-template-columns:minmax(0,1fr)70px!important}',
      '@media(max-width:1150px){#view-tickets.support-workbench{grid-template-columns:120px 260px minmax(0,1fr)!important}.support-detail .detail-grid{grid-template-columns:repeat(3,minmax(0,1fr))!important}.ticket-actions{grid-template-columns:repeat(3,minmax(0,1fr))!important}.ticket-action-field-wide{grid-column:span 3!important}}',
      '@media(max-width:850px){.main.support-main{overflow:auto!important}#view-tickets.support-workbench{display:grid!important;grid-template-columns:1fr!important;height:auto!important;overflow:visible!important}.queue-panel,.ticket-list-panel,.support-detail{height:auto!important;max-height:none!important}.support-detail{display:block!important}.compact-filters{display:grid!important}}'
    ].join('\n');
    document.head.appendChild(style);
  }

  function forceWorkspace() {
    var ticketsButton = document.querySelector('[data-view="tickets"]');
    if (ticketsButton) ticketsButton.click();
    var title = document.getElementById('tickets-title');
    if (title) title.textContent = 'Dashboard';
    document.querySelectorAll('[data-view="tickets"] span:last-child').forEach(function (node) {
      node.textContent = 'Dashboard';
    });
  }

  function start() {
    addCss();
    forceWorkspace();
    window.setTimeout(forceWorkspace, 250);
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>
